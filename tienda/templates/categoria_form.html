{% extends "base.html" %}

{% block titulo %}{{ titulo }} · Panel{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h1 class="h3 mb-4">{{ titulo }}</h1>
            <form method="post" class="form-render">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors|striptags }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="{% url 'tienda:admin_categorias' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
