{% extends "base.html" %}

{% block titulo %}Ingresar · Vittorio Coffee{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h1 class="h3 mb-3">Ingresar</h1>

            {% if form.errors %}
                <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuario</label>
                    <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label">Contraseña</label>
                    <input type="password" name="password" id="id_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
            <p class="mt-3 mb-0 small text-center"><a href="{% url 'tienda:recuperar_password' %}">¿Olvidaste tu contraseña?</a></p>
        </div>
    </div>
</div>
{% endblock %}
