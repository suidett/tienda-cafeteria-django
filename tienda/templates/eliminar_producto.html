{% extends "base.html" %}

{% block titulo %}Eliminar producto · Panel{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h1 class="h4 mb-3">¿Eliminar este producto?</h1>
            <p>Estás por eliminar <strong>{{ producto.nombre }}</strong>
               ({{ producto.categoria.nombre }}). Esta acción no se puede deshacer.</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'tienda:admin_productos' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
