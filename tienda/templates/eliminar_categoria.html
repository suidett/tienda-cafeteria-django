{% extends "base.html" %}

{% block titulo %}Eliminar categoría · Panel{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h1 class="h4 mb-3">¿Eliminar esta categoría?</h1>
            <p>Vas a eliminar <strong>{{ categoria.nombre }}</strong>.
               (Si tiene productos asociados, no se podrá borrar.)</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'tienda:admin_categorias' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
